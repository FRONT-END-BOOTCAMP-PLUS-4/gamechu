name: 기능 추가
description: 새로운 기능을 추가할 때 사용하는 템플릿입니다.
title: "[feat]: 구현사항 요약"
labels: ["feature"]
assignees: []
projects: ["FRONT-END-BOOTCAMP-PLUS-4/9"]
body:
    - type: textarea
      id: description
      attributes:
          label: "✅ 어떤 기능인가요?"
          placeholder: 설명 작성
      validations:
          required: true
    - type: textarea
      id: tasks
      attributes:
          label: "🛠 작업 상세 내용"
          value: "- [ ] todo\n- [ ] todo"
      validations:
          required: true
    - type: textarea
      id: references
      attributes:
          label: "📚 참고자료 (선택)"
      validations:
          required: false
    - type: markdown
      attributes:
          value: "⚠️ **Assignee 까먹지 말고 본인 선택하기!**"
